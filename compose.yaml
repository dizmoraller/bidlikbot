services:
  bot:
    container_name: bidlik
    build:
      context: .
      dockerfile: Containerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bidlik-net

  db:
    container_name: postgres
    image: docker.io/postgres:10-alpine
    ports: 
      - "127.0.0.1:5432:5432"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - bidlik-net

volumes:
  pgdata:

networks:
  bidlik-net:
    name: bidlik-net
